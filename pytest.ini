[pytest]
# JCPR-TS-V01 Integration Test Configuration
# Stage 2B Deliverable 1

minversion = 7.0
testpaths = tests
asyncio_mode = auto

# Markers for selective test runs
markers =
    integration: integration tests (require SQLite WAL + KIS paper SDK)
    wal: SQLite WAL store concurrency & integrity tests
    kis_happy: KIS paper trading happy-path e2e tests
    kis_reject: KIS paper trading pre-trade rejection tests
    kill_switch: ESC / Ctrl-C kill switch tests (model spec)
    recovery: restart & recovery consistency tests
    secret_leak: secret-leakage regression tests
    slow: tests that take more than 5 seconds

# Strict marker enforcement: typo in marker name -> error, not silent skip
addopts =
    --strict-markers
    --strict-config
    -ra
    --tb=short
    --showlocals
    -p no:cacheprovider

# Logging during tests
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s

# Fail on warnings that we care about; allow DeprecationWarning from third-party
filterwarnings =
    error::pytest.PytestUnraisableExceptionWarning
    ignore::DeprecationWarning:kis_sdk.*

# Timeout safeguard: no single test should hang the suite
# Requires pytest-timeout if you want to enforce; otherwise advisory only.
# timeout = 60
